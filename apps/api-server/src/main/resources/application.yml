spring:
  application:
    name: copilot-api-server
  profiles:
    default: local
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/copilot}
    username: ${JDBC_USERNAME:copilot}
    password: ${JDBC_PASSWORD:copilot}
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:26MB}
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
      embedding: ${SPRING_AI_EMBEDDING_MODEL:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        model: ${COPILOT_CHAT_MODEL:gpt-5-mini}
        temperature: ${COPILOT_CHAT_TEMPERATURE:0.1}
      embedding:
        model: ${COPILOT_EMBEDDING_MODEL:text-embedding-3-small}
        dimensions: ${COPILOT_EMBEDDING_DIMENSIONS:1536}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

copilot:
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:copilot-documents}
  upload:
    max-file-size-bytes: ${COPILOT_MAX_FILE_SIZE_BYTES:26214400}
  embedding:
    provider: ${COPILOT_EMBEDDING_PROVIDER:hash}
    model: ${COPILOT_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${COPILOT_EMBEDDING_DIMENSIONS:1536}
    batch-size: ${COPILOT_EMBEDDING_BATCH_SIZE:32}
  chat:
    provider: ${COPILOT_CHAT_PROVIDER:none}
    max-evidence-characters: ${COPILOT_CHAT_MAX_EVIDENCE_CHARACTERS:12000}
