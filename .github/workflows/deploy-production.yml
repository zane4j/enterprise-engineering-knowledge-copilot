name: Build and Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional existing image tag to deploy
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn --batch-mode --no-transfer-progress clean verify

  publish:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "image_tag=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: MODULE=apps/api-server
          tags: ghcr.io/${{ github.repository_owner }}/enterprise-engineering-knowledge-copilot-api:${{ steps.meta.outputs.image_tag }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: MODULE=apps/ingestion-worker
          tags: ghcr.io/${{ github.repository_owner }}/enterprise-engineering-knowledge-copilot-worker:${{ steps.meta.outputs.image_tag }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy immutable image tag
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "sed -i -E 's/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=$IMAGE_TAG/' /opt/enterprise-engineering-knowledge-copilot/config/production.env && \
             /opt/enterprise-engineering-knowledge-copilot/deploy/deploy.sh"
